{% extends "base.html" %}

{% block title %}Logowanie{% endblock %}

{% block content %}
<div class="login-container">
    <h2>Zaloguj się</h2>
    <form method="post" class="custom-form">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" class="btn-blue">Zaloguj</button>
    </form>
</div>

<style>
    .login-container {
        max-width: 400px; /* Обмежуємо ширину форми, щоб вона не розтягувалась на весь екран */
    }

    .login-container h2 {
        margin-top: 0;
        margin-bottom: 20px;
        font-family: sans-serif;
        font-size: 24px;
    }

    /* Відступи між полями форми */
    .custom-form p {
        margin-bottom: 15px;
    }

    /* Стилізація підписів (label) */
    .custom-form label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #333;
        font-family: sans-serif;
    }

    /* Стилізація полів вводу (input) */
    .custom-form input[type="text"],
    .custom-form input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 15px;
        font-family: sans-serif;
    }

    /* Ефект при кліку на поле вводу */
    .custom-form input[type="text"]:focus,
    .custom-form input[type="password"]:focus {
        border-color: #0d6efd;
        outline: none;
        box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.25);
    }

    /* Стилізація кнопки під стиль вашого скріншоту */
    .btn-blue {
        background-color: #0d6efd; /* Синій колір, як на вашому екрані */
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px; /* Легке закруглення кутів */
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        margin-top: 10px;
        transition: background-color 0.2s ease;
    }

    .btn-blue:hover {
        background-color: #0b5ed7; /* Трохи темніший синій при наведенні курсору */
    }
</style>
{% endblock %}
