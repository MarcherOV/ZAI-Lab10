{% extends 'base.html' %}
{% block title %}{{ course.title }}{% endblock %}

{% block content %}
    <h2>{{ course.title }}</h2>
    <div class="workspace">
        <p><strong>Numer:</strong> {{ course.number }}</p>
        <p><strong>Opis:</strong> {{ course.description }}</p>
        <p><strong>Czas trwania:</strong> {{ course.hours }} godzin</p>
        <p><strong>Cena:</strong> {{ course.price }} PLN</p>
    </div>
    <br>
    <a href="{% url 'register_view' %}" class="btn-save" style="text-decoration:none;">Zarejestruj się na to szkolenie</a>
{% endblock %}
